<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop Pet AI</title>
    <!--
      Live2D Cubism Core(專有授權,不可隨專案散布)
      請自行從 https://www.live2d.com/sdk/download/web/ 下載後,
      將 live2dcubismcore.min.js 放到 public/vendor/ 內。
      檔案不存在時此 script 會 404,前端會顯示引導畫面。
    -->
    <script src="/vendor/live2dcubismcore.min.js"></script>
    <style>
      html,
      body,
      #app {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
      body {
        user-select: none;
        -webkit-user-select: none;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
